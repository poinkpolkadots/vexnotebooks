{% extends "base.html" %}

{% block content %}
    <!--title of notebook-->
    <h1>{% block title %}{{ notebook[1] }}{% endblock %}</h1>
    <!--upload date-->
    <h6>Uploaded on {{ notebook[4] }}</h6>
    <!--able to edit name of notebook within the notebook viewing page-->
    <form method="post">
        <p>
            Edit Notebook Name
            <label for="name">Name of notebook</label>
            <input type="text" name="name" id="name"
                   value="{{ notebook[1] }}">
        </p>
        <p>
            <button type="submit">Submit</button>
        </p>
    </form>
    <!--right now, just displaying llm output as text-->
    <h2>LLM Output</h2>
    <p>{{ notebook[3] }}</p>
{% endblock %}
